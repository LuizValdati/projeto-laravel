server {
    listen 80;
    server_name localhost;

    # A raiz pública do Laravel: só o que está em public/ fica acessível.
    root /var/www/public;
    index index.php;

    # Toda requisição que não for um arquivo existente cai no index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Quando a requisição é para um arquivo .php, o nginx repassa para o
    # container "app" (php-fpm) na porta 9000.
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Bloqueia acesso a arquivos ocultos (.env, .git, etc.).
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
